<!-- formulario -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
      </ul>
    </nav>
    <h1>Formulario</h1>
  </header>

  <main>

    <h2>Contacto</h2>
    <form>
  <label for="nombreContacto">Tu nombre:</label>
  <input type="text" id="nombreContacto" name="nombreContacto" required>

  <label for="emailContacto">Para:</label>
  <input type="email" id="emailContacto" name="emailContacto" required>

  <label for="mensaje">Mensaje:</label>
  <textarea id="mensaje" name="mensaje" rows="5" cols="40" required></textarea>

  <button type="submit">Enviar mensaje</button>
  <div class="mensaje-envio"></div>
</form>

  </main>

</body>
</html>
