<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniFlix - Suscripción</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>MiniFlix</h1>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="destacadas.html">Películas Destacadas</a></li>
        <li><a href="formulario.html">Suscribite</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Formulario de suscripción</h2>
    <form>
      <label for="nombre">Nombre:</label><br>
      <input type="text" id="nombre" name="nombre" required><br><br>

      <label for="email">Correo electrónico:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="contrasena">Contraseña:</label><br>
      <input type="password" id="contrasena" name="contrasena" required><br><br>

      <button type="submit">Enviar</button>
      <div class="mensaje-envio"></div>
    </form>

    <h2>Contacto</h2>
    <form>
      <label for="nombreContacto">Tu nombre:</label><br>
      <input type="text" id="nombreContacto" name="nombreContacto" required><br><br>

      <label for="emailContacto">Tu correo:</label><br>
      <input type="email" id="emailContacto" name="emailContacto" required><br><br>

      <label for="mensaje">Mensaje:</label><br>
      <textarea id="mensaje" name="mensaje" rows="5" cols="40" required></textarea><br><br>

      <button type="submit">Enviar mensaje</button>
      <div class="mensaje-envio"></div>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 MiniFlix. Todos los derechos reservados.</p>
    <p><a href="mailto:contacto@miniflix.com">Escribinos por correo</a></p>
  </footer>
</body>
</html>
